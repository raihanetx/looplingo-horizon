name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ci-release.jks
          chmod 600 ci-release.jks

      - name: Build Release APK
        continue-on-error: true
        env:
          KEYSTORE_FILE: ci-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName "' app/build.gradle | awk -F'"' '{print $2}')
          VERSION_CODE=$(grep 'versionCode ' app/build.gradle | awk -F' ' '{print $2}')
          echo "name=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "Building release v${VERSION_NAME} (code ${VERSION_CODE})"

      - name: Delete existing release if present
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.name }}"
          echo "Checking for existing release with tag $TAG..."
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push origin :refs/tags/"$TAG" 2>/dev/null || true

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoopLingo-Horizon-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoopLingo-Horizon-Release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: "LoopLingo Horizon ${{ steps.version.outputs.name }}"
          body: |
            Built on ${{ steps.version.outputs.date }}
            Version code: ${{ steps.version.outputs.code }}

            What's new in v3.4.0:
            - FIXED: Dialogue loop audio bleed-through — no more next-dialogue
              snippet playing at the end of each repetition
            - FIXED: Proper silence gap between dialogue repetitions — smooth
              pause-then-repeat experience (dialogue → silence → dialogue)
            - Trim cue endMs by 200ms to compensate for Whisper timing overlap
            - Immediate ExoPlayer pause on dialogue boundary detection
            - Selective dialogue loop (checkboxes to pick specific dialogues)
            - Natural pause duration control (configurable silence gap)
            - Real-time subtitle display during playback (English + Bangla)
            - Dialogue auto-loop (repeat each dialogue x N times)
            - Loop templates (save & reuse loop configurations)
            - Search bar on homepage with real-time filtering

            Download the APK below ⬇️
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: rm -f ci-release.jks
