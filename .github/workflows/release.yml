name: Build Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      # Decode the CI release keystore from GitHub Secrets
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/ci-release.jks
          chmod 600 app/ci-release.jks

      # Run unit tests first — fail fast if tests break
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # Build the release APK
      - name: Build Release APK
        env:
          KEYSTORE_FILE: app/ci-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # Run lint checks
      - name: Run Lint
        run: ./gradlew lintDebug --stacktrace
        continue-on-error: true

      # Upload the release APK as an artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: looplingo-horizon-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Upload test results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html
          retention-days: 14

      # Clean up keystore — never leave secrets on disk
      - name: Cleanup
        if: always()
        run: rm -f app/ci-release.jks
